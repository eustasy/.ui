<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Form — eustasy/.ui</title>
  <link rel="stylesheet" href="../assets/main.css">
  <script src="../js/theme-toggle.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-4);
    }
  </style>
</head>
<body>

  <article class="card" style="width: 100%; max-width: 24rem;">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
      <h3>Sign In</h3>
      <button data-theme-toggle aria-label="Toggle dark mode" class="btn btn-ghost btn-sm">🌓</button>
    </div>
    <div class="card-body">
      <form method="post" novalidate>
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email"
               placeholder="name@example.com"
               autocomplete="email"
               aria-required="true" required>

        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password"
               placeholder="••••••••"
               autocomplete="current-password"
               aria-required="true" required>

        <label for="login-dob">Date of Birth (optional)</label>
        <input id="login-dob" name="dob" type="date">

        <label><input type="checkbox" name="remember"> Remember me</label>

        <button type="submit" class="btn btn-primary btn-block" style="margin-block-start: var(--space-4);">
          Sign In
        </button>
      </form>

      <!-- Error alert — hidden by default, shown via JS on validation failure.
           Uses role="alert" to interrupt screen readers.
           Link aria-describedby on the offending input to this element's id. -->
      <div id="emailAlert" class="alert alert-danger" role="alert" hidden>
        <p>That email is not registered with us. Are you sure you typed it correctly?</p>
      </div>
    </div>
    <div class="card-footer" style="text-align: center;">
      <a href="#">Forgot password?</a>
    </div>
  </article>

</body>
</html>
